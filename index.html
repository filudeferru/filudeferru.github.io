

<!DOCTYPE html>
<html>
<head>
    <title>Le mie opere</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: #111;
            color: white;
        }

        header {
            text-align: center;
            padding: 40px 20px;
            background: #000;
        }

        h1 {
            margin: 0;
            font-size: 2.5em;
        }

        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            padding: 40px;
        }

        .card {
            background: #1c1c1c;
            border-radius: 10px;
            overflow: hidden;
            transition: 0.3s;
        }

        .card:hover {
            transform: scale(1.03);
        }

        .card img {
            width: 100%;
            display: block;
        }

        .card p {
            padding: 15px;
            text-align: center;
        }

        footer {
            text-align: center;
            padding: 20px;
            background: #000;
            font-size: 0.9em;
            color: #aaa;
        }
    </style>
</head>
<body>

<header>
    <h1>Le mie opere 🎨</h1>
</header>

<section class="gallery">

    <div class="card">
        <img src="https://via.placeholder.com/600x400" alt="Opera 1">
        <p>Titolo Opera 1</p>
    </div>

    <div class="card">
        <img src="https://via.placeholder.com/600x400" alt="Opera 2">
        <p>Titolo Opera 2</p>
    </div>

    <div class="card">
        <img src="https://via.placeholder.com/600x400" alt="Opera 3">
        <p>Titolo Opera 3</p>
    </div>

</section>
